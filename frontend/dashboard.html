<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <script defer src="dashboard.js"></script>
</head>
<body>
    <h2 id="user-greeting">Welcome to Your Dashboard</h2>
    <div class="dashboard-actions">
    <button id="add-transaction-btn" class="dashboard-btn">Add Transaction</button>
    <button id="view-transactions-btn" class="dashboard-btn">View Transactions</button>
    <button id="logout-btn" class="dashboard-btn logout-btn">Logout</button>
</div>


    <div id="summary-section">
        <p id="summary-savings">Total Savings: ₹0.00</p>
        <p id="summary-expenses">Total Expenses: ₹0.00</p>
        <p id="summary-balance">Net Balance: ₹0.00</p>
    </div>
</body>
</html>
